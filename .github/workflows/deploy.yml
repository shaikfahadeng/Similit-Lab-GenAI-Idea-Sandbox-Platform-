name: Deploy Similit Flow

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          WEBAPP_NAME: ${{ secrets.WEBAPP_NAME }}
        run: |
          missing=0
          for name in AZURE_CREDENTIALS ACR_NAME ACR_LOGIN_SERVER WEBAPP_NAME; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build Docker image
        run: docker build -t "${{ secrets.ACR_LOGIN_SERVER }}/similit-flow:${{ github.sha }}" .

      - name: Push Docker image
        run: docker push "${{ secrets.ACR_LOGIN_SERVER }}/similit-flow:${{ github.sha }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.WEBAPP_NAME }}
          images: "${{ secrets.ACR_LOGIN_SERVER }}/similit-flow:${{ github.sha }}"
